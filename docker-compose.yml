services:
  postgres:
    image: postgres:15-alpine
    container_name: financeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financeos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: oven/bun:1.2.15-alpine
    container_name: financeos-api
    working_dir: /workspace
    command: sh -c "bun install && bun --filter @financeos/api dev"
    env_file:
      - .env.example
    ports:
      - '3001:3001'
    volumes:
      - .:/workspace
    depends_on:
      - postgres

  web:
    image: oven/bun:1.2.15-alpine
    container_name: financeos-web
    working_dir: /workspace
    command: sh -c "bun install && bun --filter @financeos/web dev --host 0.0.0.0"
    env_file:
      - .env.example
    ports:
      - '5173:5173'
    volumes:
      - .:/workspace
    depends_on:
      - api

volumes:
  postgres-data:
